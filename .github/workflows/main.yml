name: "Godot iOS Unsigned Build - Ultimate Fix"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ios-unsigned-export:
    runs-on: macos-latest

    steps:
      # ১. রিপোজিটরি থেকে সোর্স কোড চেকআউট করা
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ২. গডট ইঞ্জিন এবং অফিসিয়াল এক্সপোর্ট টেমপ্লেট ডাউনলোড ও সেটআপ
      - name: Setup Godot Engine & Templates
        run: |
          GODOT_VERSION="4.2.2"
          
          # গডট ম্যাক ওএস হেডলেস বাইনারি ডাউনলোড
          curl -LO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          unzip Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          mv Godot.app /Applications/Godot.app
          
          # এক্সপোর্ট টেমপ্লেট ডাউনলোড ও সেটআপ
          curl -LO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable
          unzip Godot_v${GODOT_VERSION}-stable_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable/
          
          echo "Godot environment successfully set up."

      # ৩. রানারের ডিরেক্টরি পারমিশন ফিক্স করা
      - name: Fix Directory Permissions
        run: |
          sudo chown -R runner:staff .
          chmod -R 777 .

      # ৪. গডটের ইন্টারনাল কমান্ড ব্যবহার করে কোনো প্রিসেট ছাড়াই সরাসরি প্রজেক্ট প্যাক (.pck) তৈরি করা
      - name: Pack Project Files Freely
        run: |
          mkdir -p build/ios
          # --pack কমান্ডটি কোনো প্রিসেট ফাইল ছাড়া সরাসরি ফ্রেশ .pck ফাইল তৈরি করে দেবে
          /Applications/Godot.app/Contents/MacOS/Godot --headless --path . --pack build/ios/game.pck

          # ফাইলটি তৈরি হয়েছে কিনা তা নিশ্চিত করা
          if [ ! -f "build/ios/game.pck" ]; then
            echo "Error: game.pck was not generated!"
            exit 1
          fi
          echo "game.pck generated successfully without any presets."

      # ৫. নেটিভ আইওএস বিল্ড স্ট্রাকচার এবং অফিশিয়াল কন্টেইনার রেডি করা
      - name: Structure Native iOS App Package
        run: |
          cd build/ios
          
          # গডটের অফিসিয়াল আইওএস টেমপ্লেট বাইনারি থেকে ডামি অ্যাপ এক্সট্র্যাক্ট করা
          cp ~/Library/Application\ Support/Godot/export_templates/4.2.2.stable/ios.zip .
          unzip ios.zip
          rm ios.zip
          
          # জেনারেট হওয়া ডামি স্ট্রাকচারে আমাদের গেমের .pck ডেটা পুশ করা
          mkdir -p Payload/GodotApp.app
          cp -r * Payload/GodotApp.app/ 2>/dev/null || true
          mv Payload/GodotApp.app/game.pck Payload/GodotApp.app/godot.pck

      # ৬. এক্সকোড বা অ্যাপল সিএলআই ছাড়াই সলিড আনসাইনড আইপিএ জেনারেট করা
      - name: Package to Unsigned .ipa
        run: |
          cd build/ios
          # পেলোড ফোল্ডারটিকে সরাসরি স্ট্যান্ডার্ড জিপ ফরম্যাটে কম্পাইল করে .ipa এক্সটেনশন দেওয়া
          zip -r MyUnsignedGame.ipa Payload
          
          mkdir -p ../../output
          cp MyUnsignedGame.ipa ../../output/

      # ৭. ফাইনাল সাকসেসফুল আনসাইনড আইপিএ ফাইলটি আর্টিফ্যাক্ট হিসেবে আপলোড করা
      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-iOS-Unsigned-App
          path: output/MyUnsignedGame.ipa
