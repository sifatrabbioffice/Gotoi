name: "Godot iOS Unsigned Build"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ios-unsigned-export:
    runs-on: macos-latest

    steps:
      # ১. রিপোজিটরি থেকে সোর্স কোড রানারে নামানো
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ২. গডট ইঞ্জিন ও আইওএস এক্সপোর্ট টেমপ্লেট কনফিগার করা
      - name: Setup Godot Engine & Templates
        run: |
          GODOT_VERSION="4.2.2"
          
          # গডট ম্যাক ওএস হেডলেস বাইনারি ডাউনলোড
          curl -LO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          unzip Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          mv Godot.app /Applications/Godot.app
          
          # অফিসিয়াল এক্সপোর্ট টেমপ্লেট ডাউনলোড ও সঠিক ডিরেক্টরিতে সেটআপ
          curl -LO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable
          unzip Godot_v${GODOT_VERSION}-stable_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable/
          
          echo "Godot engine and template setup complete."

      # ৩. রানার এনভায়রনমেন্ট ক্লিন করা এবং পারমিশন দেওয়া
      - name: Clean & Fix Directory Permissions
        run: |
          chmod -R 777 .
          rm -f export_presets.cfg
          rm -rf .godot
          mkdir -p .godot/editor
          chmod -R 777 .godot

      # ৪. গডট ৪.এক্স-এর মিসিং এডিটর সেটিংস বাগ ফিক্স করা (The Core Fix)
      - name: Mock Godot Editor Settings
        run: |
          # গডট যে গ্লোবাল ডিরেক্টরিতে সেটিংস ফাইল খোঁজে তা তৈরি করা
          mkdir -p "/Users/runner/Library/Application Support/Godot"
          
          # একটি মিনিমাল বৈধ editor_settings-4.tres ফাইল তৈরি করা
          cat << 'EOF' > "/Users/runner/Library/Application Support/Godot/editor_settings-4.tres"
          [gd_resource type="EditorSettings" format=3]

          [resource]
          EOF
          
          echo "Global Godot editor settings mocked successfully."

      # ৫. নিখুঁতভাবে ফ্রেশ প্রিসেট ফাইল তৈরি করা
      - name: Inject Valid iOS Export Preset
        run: |
          cat << 'EOF' > export_presets.cfg
          [preset.0]
          name="iOS"
          platform="iOS"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/ios/MyGame.xcodeproj"
          encryption/encrypt_pck=false
          encryption/encrypt_directory=false

          [preset.0.options]
          architectures/arm64=true
          application/identifier="com.unsigned.godotgame"
          application/name="MyGame"
          application/signature="????"
          application/short_version="1.0"
          application/version="1.0"
          application/app_store_team_id="12345ABCDE"
          application/provisioning_profile_uuid_release="00000000-0000-0000-0000-000000000000"
          application/code_sign_identity_release="Apple Development"
          application/export_with_unrecognized_profiles=true
          user_team_id="12345ABCDE"
          EOF
          echo "Fresh export_presets.cfg created successfully."

      # ৬. গডট প্রোজেক্ট রিসোর্স মেটাডেটা প্রিপেয়ার করা
      - name: Godot Force Import Assets & Metadata
        run: |
          /Applications/Godot.app/Contents/MacOS/Godot --headless --path . --editor --quit || true

      # ৭. গডট ইঞ্জিনের সাহায্যে এক্সকোড প্রোজেক্ট স্ট্রাকচার জেনারেট করা
      - name: Export Godot Project to Xcode
        run: |
          mkdir -p build/ios
          # এবার সেটিংস এবং মেটাডেটা দুটিই পাওয়ায় গডট নিখুঁতভাবে এক্সপোর্ট জেনারেট করবে
          /Applications/Godot.app/Contents/MacOS/Godot --headless --path . --export-release "iOS" build/ios/MyGame.xcodeproj

      # ৮. এক্সকোড সিএলআই ব্যবহার করে কোড সাইনিং ছাড়া কম্পাইল করা
      - name: Build Unsigned App via Xcode CLI
        run: |
          cd build/ios
          
          if [ ! -d "MyGame.xcodeproj" ]; then
            echo "Error: MyGame.xcodeproj was not generated by Godot!"
            exit 1
          fi
          
          xcodebuild clean build \
            -project MyGame.xcodeproj \
            -scheme "MyGame" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      # ৯. তৈরি হওয়া বাইনারিকে আইওএস স্ট্যান্ডার্ড .ipa প্যাকেজে রূপান্তর করা
      - name: Package App to Unsigned IPA
        run: |
          mkdir -p output/Payload
          cp -r build/ios/build/Release-iphoneos/MyGame.app output/Payload/
          cd output
          zip -r MyUnsignedGame.ipa Payload
          rm -rf Payload

      # ১০. জেনারেট হওয়া আনসাইনড আইপিএ ফাইলটি গিটহাব আর্টিফ্যাক্ট হিসেবে আপলোড করা
      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-iOS-Unsigned-App
          path: output/MyUnsignedGame.ipa
