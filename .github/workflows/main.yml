name: "Godot iOS Unsigned Build with XcodeGen"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # ১. রিপোজিটরি থেকে কোড চেকআউট করা
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. জিপ ফাইল আনজিপ করা
      - name: Unzip Project Files
        run: |
          echo "Unzipping project files..."
          unzip -o game_project.zip -d project_folder
          
      # ৩. গডট ইঞ্জিন ডাউনলোড ও সেটআপ করা
      - name: Download and Setup Godot Engine
        run: |
          echo "Downloading Godot Engine..."
          curl -L -o Godot.zip https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_macos.universal.zip
          unzip Godot.zip
          mv Godot.app /Applications/Godot.app
          echo "/Applications/Godot.app/Contents/MacOS" >> $GITHUB_PATH

      # ৪. গডট প্রজেক্ট থেকে আইওএস সোর্স ফাইল এক্সপোর্ট করা
      - name: Godot Export to iOS Source
        run: |
          mkdir -p build/ios
          # এখানে আমরা ডিরেক্টরি হিসেবে এক্সপোর্ট করছি, সরাসরি xcodeproj ফাইল হিসেবে নয়
          Godot --headless --path project_folder --export-release "iOS" build/ios/

      # ৫. XcodeGen ইনস্টল ও রান করা (যদি প্রজেক্ট ফাইল মিসিং থাকে)
      - name: Install and Run XcodeGen
        run: |
          brew install xcodegen
          cd build/ios
          
          # যদি গডট অলরেডি xcodeproj তৈরি না করে থাকে, তবে XcodeGen এর জন্য একটি configuration তৈরি করা
          if [ ! -d "game.xcodeproj" ]; then
            echo "game.xcodeproj not found. Generating with XcodeGen..."
            
            # একটি বেসিক project.yml ফাইল তৈরি করা
            cat <<EOF > project.yml
            name: game
            options:
              bundleIdPrefix: com.example
            targets:
              game:
                type: application
                platform: iOS
                deploymentTarget: "14.0"
                sources: [.]
            EOF
            
            xcodegen generate
          else
            echo "game.xcodeproj already exists. Skipping XcodeGen."
               fi

      # ৬. এক্সকোড দিয়ে আনসাইনড আইপিএ তৈরি করা
      - name: Build Xcode Project (Unsigned)
        run: |
          cd build/ios
          xcodebuild -project game.xcodeproj \
            -scheme "game" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      # ৭. বিল্ড করা ফাইলগুলোকে আর্টফ্যাক্ট হিসেবে সেভ করা
      - name: Upload Unsigned Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-build
          path: build/ios/build/Release-iphoneos/
