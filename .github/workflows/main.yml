name: "Godot iOS Unsigned Build - Ultimate Fix"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ios-unsigned-export:
    runs-on: macos-latest

    steps:
      # ১. রিপোজিটরি থেকে সোর্স কোড চেকআউট করা
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ২. গডট ইঞ্জিন এবং অফিসিয়াল এক্সপোর্ট টেমপ্লেট ডাউনলোড ও সেটআপ
      - name: Setup Godot Engine & Templates
        run: |
          GODOT_VERSION="4.2.2"
          
          # গডট ম্যাক ওএস হেডলেস বাইনারি ডাউনলোড
          curl -LO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          unzip Godot_v${GODOT_VERSION}-stable_macos.universal.zip
          mv Godot.app /Applications/Godot.app
          
          # এক্সপোর্ট টেমপ্লেট ডাউনলোড ও সেটআপ
          curl -LO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable
          unzip Godot_v${GODOT_VERSION}-stable_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/Library/Application\ Support/Godot/export_templates/${GODOT_VERSION}.stable/
          
          echo "Godot environment successfully set up."

      # ৩. রানারের ডিরেক্টরি পারমিশন ফিক্স করা (Write Permission Error Fix)
      - name: Hard Fix Directory Permissions
        run: |
          sudo chown -R runner:staff .
          chmod -R 777 .
          rm -rf .godot
          mkdir -p .godot/editor
          chmod -R 777 .godot

      # ৪. গডটকে সন্তুষ্ট করার জন্য একটি বেসিক ইউনিভার্সাল প্রিসেট তৈরি করা
      # (এর জন্য কোনো টিম আইডি বা আইডেন্টিফায়ার লাগবে না, কারণ এটি লিনাক্স/ম্যাক প্যাক হিসেবে কাজ করবে)
      - name: Inject Basic Universal Export Preset
        run: |
          cat << 'EOF' > export_presets.cfg
          [preset.0]
          name="macOS"
          platform="macOS"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/ios/game.pck"
          encryption/encrypt_pck=false
          encryption/encrypt_directory=false

          [preset.0.options]
          custom_template/release=""
          custom_template/debug=""
          binary_format/architecture="universal"
          texture_format/s3tc=true
          texture_format/etc2=true
          EOF
          echo "Universal export_presets.cfg created successfully."

      # ৫. গডটকে দিয়ে একটি ইউনিভার্সাল পিসিকে (Project Pack - .pck) ফাইল জেনারেট করা
      - name: Export Godot Project Pack (.pck)
        run: |
          mkdir -p build/ios
          /Applications/Godot.app/Contents/MacOS/Godot --headless --path . --export-pack "macOS" build/ios/game.pck
          
          if [ ! -f "build/ios/game.pck" ]; then
            echo "Error: Failed to generate game.pck data file!"
            exit 1
          fi

      # ৬. এক্সক্লুসিভ আইওএস বিল্ড স্ট্রাকচার এবং অফিসিয়াল কন্টেইনার রেডি করা
      - name: Structure Native iOS App Package
        run: |
          cd build/ios
          
          # গডটের অফিসিয়াল আইওএস টেমপ্লেট বাইনারি থেকে ডামি অ্যাপ এক্সট্র্যাক্ট করা
          cp ~/Library/Application\ Support/Godot/export_templates/4.2.2.stable/ios.zip .
          unzip ios.zip
          rm ios.zip
          
          # জেনারেট হওয়া ডামি স্ট্রাকচারে আমাদের গেমের .pck ডেটা পুш করা
          mkdir -p Payload/GodotApp.app
          cp -r * Payload/GodotApp.app/ 2>/dev/null || true
          mv Payload/GodotApp.app/game.pck Payload/GodotApp.app/godot.pck

      # ৭. এক্সকোড বা অ্যাপল সিএলআই ছাড়াই সলিড আনসাইনড আইপিএ জেনারেট করা
      - name: Package to Unsigned .ipa
        run: |
          cd build/ios
          # পেলোড ফোল্ডারটিকে সরাসরি স্ট্যান্ডার্ড জিপ ফরম্যাটে কম্পাইল করে .ipa এক্সটেনশন দেওয়া
          zip -r MyUnsignedGame.ipa Payload
          
          mkdir -p ../../output
          cp MyUnsignedGame.ipa ../../output/

      # ৮. ফাইনাল সাকসেসফুল আনসাইনড আইপিএ ফাইলটি আর্টিফ্যাক্ট হিসেবে আপলোড করা
      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Godot-iOS-Unsigned-App
          path: output/MyUnsignedGame.ipa
