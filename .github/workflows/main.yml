name: "Godot iOS Unsigned Build"

on:
  push:
    branches:
      - main  # আপনার মেইন ব্রাঞ্চের নাম (প্রয়োজনে পরিবর্তন করুন)
  workflow_dispatch: # এর মাধ্যমে আপনি গিটহাব থেকে ম্যানুয়ালিও বিল্ড রান করতে পারবেন

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # ১. রিপোজিটরি থেকে কোড চেকআউট করা
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. জিপ ফাইল আনজিপ করা
      # মনে করুন আপনার জিপ ফাইলের নাম 'game_project.zip'
      - name: Unzip Project Files
        run: |
          echo "Unzipping project files..."
          unzip -o Ggame.zip -d project_folder
          
      # ৩. গডট ইঞ্জিন ডাউনলোড ও সেটআপ করা
      # এখানে গডট ৪.x এর একটি স্ট্যান্ডার্ড ভার্সন ব্যবহার করা হয়েছে। আপনার ভার্সন অনুযায়ী লিংক বদলাতে পারেন।
      - name: Download and Setup Godot Engine
        run: |
          echo "Downloading Godot Engine..."
          curl -L -o Godot.zip https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_macos.universal.zip
          unzip Godot.zip
          mv Godot.app /Applications/Godot.app
          echo "/Applications/Godot.app/Contents/MacOS" >> $GITHUB_PATH

      # ৪. গডট প্রজেক্ট বিল্ড করা (Xcode Project জেনারেট করা)
      # 'iOS' হচ্ছে আপনার Godot Export Preset এর নাম। 
      # 'project_folder/project.godot' হলো আনজিপ হওয়া মেইন প্রজেক্ট ফাইল।
      - name: Godot Export to Xcode Project
        run: |
          mkdir -p build/ios
          Godot --headless --path project_folder --export-release "iOS" build/ios/game.xcodeproj

      # ৫. এক্সকোড দিয়ে আনসাইনড আইপিএ/বিল্ড তৈরি করা
      - name: Build Xcode Project (Unsigned)
        run: |
          cd build/ios
          xcodebuild -project game.xcodeproj \
            -scheme "game" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      # ৬. বিল্ড করা ফাইলগুলোকে জিপ/আইপিএ আকারে আর্টফ্যাক্ট হিসেবে সেভ করা
      - name: Upload Unsigned Build Artifact
        uses: actions/artifacts@v4
        with:
          name: ios-unsigned-build
          path: build/ios/build/Release-iphoneos/
